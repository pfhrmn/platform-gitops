apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: k8s.gcr.io/external-dns/external-dns:v0.14.0
        args:
        - --source=ingress
        - --domain-filter=deine-domain.at
        - --provider=google
        - --google-project=infra-iac-gke-gcp
        - --policy=sync
        - --registry=txt
        - --txt-owner-id=gke
