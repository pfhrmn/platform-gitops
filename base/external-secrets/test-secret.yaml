apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: external-secrets
spec:
  refreshInterval: 10s
  secretStoreRef:
    name: gcp-secretstore
    kind: ClusterSecretStore
  target:
    name: test-secret
  data:
    - secretKey: message
      remoteRef:
        key: test-secret
